Abacus line item backfill job in billing-invoicing-service should actually update the fields on the line items vs just logging."},{"name":"CHECK-3609-india-session","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"This sets off session to false whenever an indian customer retries payment"},{"name":"billing-sync-rate-limit","experimentType":"AB_TEST","segmentName":"default","variant":"100","containsError":false,"status":"ACTIVE","description":"Rate limit for auditing billing state in Ripley from v6 aux jobs"},{"name":"allow-promo-code-on-plan-level-changes","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"When enabled, gives customers the option to enter a promo code when upgrading or downgrading a Website plan. This does not include plan cycle changes. See BILL-7071."},{"name":"price-refresh-job-max-thread-pool-size","experimentType":"AB_TEST","segmentName":"default","variant":"4","containsError":false,"status":"ACTIVE","description":"The number of threads running in the V6 Hamster job PriceRefreshJob. "},{"name":"product-to-plan-backfill-job","experimentType":"AB_TEST","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"For BILL-8212, when enabled updates planTypes and planLines using legacy productTypes and productLines values."},{"name":"validate-canadian-postal-codes","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"If enabled, the v6 PUT /billing/customer endpoint will validate postal codes in the request when the country provided is Canada and throw an exception if it is invalid or does not match the province provided in the request."},{"name":"vertex-primary-source","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"If Vertex is enabled (i.e. the vertex-enabled flag is turned on) enabling this flag will cause Vertex to be used as the primary taxation source. \n\nIf this flag is disabled, Taxation Service/TaxJar will be the primary taxation source and Vertex will run in shadow mode.\n\nIf the vertex-enabled flag is disabled, toggling vertex-primary-source will have no effect."},{"name":"allow-promo-code-on-plan-change","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"If enabled, we will give customers the option to add a promo code at checkout during plan cycle upgrades (i.e. from monthly to annual) on Websites."},{"name":"allow-circle-discount-for-member-areas","experimentType":"AB_TEST","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"When enabled, first-time annual member areas subscription purchases will receive an automatic Circle discount (20%) if created by a Circle member."},{"name":"provisioning-event-handling-state","experimentType":"AB_TEST","segmentName":"default","variant":"process","containsError":false,"status":"ACTIVE","description":"Whether v6 provisioning event processor should block, skip, or process provisioning events.  Part of the transition from billing to provisioning events for the bundlin' project."},{"name":"plan-backfill-mongo-BILL-8212","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"For BILL-8212, when enabled updates MarketingCoupon planTypes and planLines fields using data in legacy productTypes and productLines fields in Mongo"},{"name":"price-refresh-job-annual-batch-size","experimentType":"AB_TEST","segmentName":"default","variant":"2500","containsError":false,"status":"ACTIVE","description":"Maximum number of annual subscriptions processed in an hourly run of the V6 price refresh job."},{"name":"enable-billing-event-ack","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"Decides whether to save an ack to BillingEventAcks in v6 aux billing event consumer.  Disable if write is too slow."},{"name":"skip-rabbit-in-tax-percent-sync","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"Whether or not the tax percent sync triggered by Taxation should use RabbitMQ AND Kafka, or just Kafka."},{"name":"use-provisioning-for-v6-provisioned-products","experimentType":"AB_TEST","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"Whether to call provisioning service instead of using v6 billing accounts"},{"name":"con-and-sub-event-handling-state","experimentType":"AB_TEST","segmentName":"default","variant":"wait-on-provisioning","containsError":false,"status":"ACTIVE","description":"Whether v6 billing contract & subscription event processors should process both contract & provisioning logic, block all processing, or wait on the provisioning event processor to process provisioning logic and then process. Part of the transition from billing to provisioning events for the bundlin' project."},{"name":"populate-legal-entity-on-line-items","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"When this flag is enabled, Ripley will populate Legal Entity ID on AccountingInvoiceLineItem events."},{"name":"subset-run-domain-currency-fix","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"Run the job with only one domain if we're operating on the problematic domains (with a deleted old website)"},{"name":"populate-action-on-line-items","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"Whether to populate the new 'action' field on line items in Ripley and billing events. Used by Finance Products for integration with Oracle (see BILL-8576)."},{"name":"skip-stripe-events","experimentType":"AB_TEST","segmentName":"default","variant":"do-not-skip","containsError":true,"status":"INACTIVE","description":"This A/B test takes in a list of Stripe event IDs that should be skipped in the Ripley KafkaEventProcessor. This allows us to unblock event consumption."},{"name":"bundling-eligible","experimentType":"AB_TEST","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"This A/B test determines whether or not a customer should go through the bundling path when creating a new website."},{"name":"vertex-enforce-cache-use","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"Enforces use of cache even if external vertex system is available. This is for testing purpose only."},{"name":"ukraine-suppress-billing-renewal-emails","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"When enabled, we do not send billing renewal emails to customers in Ukraine since we're actively crediting them."},{"name":"no-website-run-domain-currency-fix","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"Whether or not we should run the currency fix job for domains with no old website"},{"name":"vertex-enabled","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"If this flag is enabled, Ripley will began refreshing its Vertex authentication token and making Vertex API requests during invoice creation. This flag is not intended to indicate how Ripley will use Vertex sourced tax data (i.e. SHADOW vs. PRIMARY mode). That is controlled by vertex-primary-source."},{"name":"credit-india-customers-dry-run","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"For COE-1682/BILL-7390, we set up a job to credit customers so that their subscriptions would not expire. This toggle puts the job in dry-run mode so that it logs but does not credit the customer."},{"name":"show-quantity-on-invoices","experimentType":"AB_TEST","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"For https://squarespace.atlassian.net/browse/CHECK-4840 and https://squarespace.atlassian.net/browse/BILL-8438 - determines whether we should show additional copy listing quantity for seated subscriptions on preview and finalized invoice lines."},{"name":"populate-discounted-line-item-id-on-line-items","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"When this flag is enabled the field accounting_invoice_line_items.discounted_line_item_id will be populated for discount line items."},{"name":"price-refresh-send-over-50-sub-emails","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"If true, we go ahead and send the Price Refresh email to customers with billing perms on >50 eligible subs, thus unblocking scheduling these subs for refresh. If false, continue to throw when these subs are encountered in the job."},{"name":"vertex-enabled-test","experimentType":"AB_TEST","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"If Vertex is enabled, Ripley will began refreshing its Vertex authentication token and making Vertex API requests during invoice creation. This flag is not intended to indicate how Ripley will use Vertex sourced tax data (i.e. SHADOW vs. PRIMARY mode). That is controlled by the vertex-primary-source feature toggle."},{"name":"ukraine-relief-email-enabled","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"Whether sending emails regarding Ukraine relief credit is enabled. \n\nIf this flag is off, any attempts (via admin endpoints) to send these emails will execute in a dry run mode that logs but does not actually send the email. If this flag is on, emails will be sent when requested."},{"name":"subscription-plan-change-details-value","experimentType":"AB_TEST","segmentName":"default","variant":"none","containsError":false,"status":"ACTIVE","description":"Should NOT be changed from the default in prod unless you're adding a custom segment.\n\nThis is a temporary experiment to control the value in the planChangeDetails field returned over the v6 API for testing until the changes in BILL-7864 can be wired up to the related Ripley changes."},{"name":"nullability-of-product-fields","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"Allows the product and invoice fields to be null without failing the billing processes. If the fields are present, process will still perform all the required validations. Is now consolidated with previous nullability-of-invoice-fields flag. If the equivalent plan fields are present, will no longer store product fields in the DB. "},{"name":"allow-promo-code-for-commerce-plan-upgrades","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"false","containsError":false,"status":"ACTIVE","description":"When enabled, give customers the option to enter a promo code when upgrading a website from a Classic to Commerce plan. See BILL-7071."},{"name":"price-refresh-job-monthly-batch-size","experimentType":"AB_TEST","segmentName":"default","variant":"2000","containsError":false,"status":"ACTIVE","description":"Maximum number of monthly subscriptions processed in an hourly run of the V6 price refresh job."},{"name":"plan-based-invoicing","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"Whether plan fields should be set on invoice line items - should not be toggled on in production until all invoicing operations are configured to set plan fields behind flag (BILL-8127 & BILL-8128)"},{"name":"process-external-events","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"Whether to process external events in place of equivalent audit events in aux"},{"name":"renew-completed-subs-without-auto-renew","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"renew subs with COMPLETED renewal state even if auto renew is off"},{"name":"send-member-areas-paused-email","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"If this flag is enabled, customers will be sent an email when their Website contract is terminated if they have an active Member Areas subscription. See BILL-7206"},{"name":"marketing-coupon-generation-uses-kafka","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"If enabled, marketing coupon generation uses Kafka instead of Rabbit. This flag should be removed once support for Rabbit is removed as part of BILL-7136."},{"name":"enable-website-trial-handler","experimentType":"FEATURE_TOGGLE","segmentName":"default","variant":"true","containsError":false,"status":"ACTIVE","description":"If enabled, it will allow calls to WebsiteTrialHandler from the four v6 locations (StatusTransitioner, WebsiteCreator, WebsiteProductFulfiller, SetWebsiteStatus). This flag should be removed by the time the entire project is live and fully functional."},{"name":"sync-billin
